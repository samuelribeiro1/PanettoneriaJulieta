<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha | Panettoneria Julieta</title>
  <link rel="icon" href="3.png" type="image/x-icon">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #0f1117;
      --bg-card: #1a1d27;
      --bg-card-hover: #22263a;
      --border: #2a2e3d;
      --text: #e4e6eb;
      --text-muted: #8b8fa3;
      --accent: #c8a55a;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --bordo: #5e1224;
      --bordo-light: #8b1a38;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- Header --- */
    .kitchen-header {
      background: linear-gradient(135deg, var(--bordo), var(--bordo-light));
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .kitchen-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .kitchen-header h1 span {
      color: var(--accent);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease infinite;
    }

    .status-dot.offline { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-stats {
      display: flex;
      gap: 20px;
    }

    .stat-badge {
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .stat-badge .count {
      color: var(--accent);
      font-size: 1.1rem;
      margin-right: 4px;
    }

    /* --- Main --- */
    .kitchen-main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .kitchen-empty {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-muted);
    }

    .kitchen-empty .icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .kitchen-empty p {
      font-size: 1.1rem;
    }

    /* --- Orders Grid --- */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    /* --- Order Card --- */
    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .order-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .order-card.status-novo { border-left: 4px solid var(--red); }
    .order-card.status-preparo { border-left: 4px solid var(--yellow); }
    .order-card.status-pronto { border-left: 4px solid var(--green); }
    .order-card.status-cancelado { border-left: 4px solid #666; opacity: 0.55; }

    .order-card.flash {
      animation: flashNew 1s ease;
    }

    @keyframes flashNew {
      0%, 50% { background: rgba(239, 68, 68, 0.15); }
      100% { background: var(--bg-card); }
    }

    .order-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .order-num {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .order-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .order-status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-novo { background: rgba(239,68,68,0.2); color: var(--red); }
    .badge-preparo { background: rgba(234,179,8,0.2); color: var(--yellow); }
    .badge-pronto { background: rgba(34,197,94,0.2); color: var(--green); }
    .badge-cancelado { background: rgba(150,150,150,0.2); color: #999; }

    .order-body { padding: 16px 20px; }

    .order-client {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
    }

    .order-client .name {
      font-weight: 700;
      font-size: 1rem;
    }

    .order-client .detail {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .order-address {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .order-address .label {
      font-weight: 600;
      color: var(--text);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .order-items { margin-bottom: 12px; }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.88rem;
    }

    .order-item .qty {
      font-weight: 700;
      color: var(--accent);
      min-width: 30px;
    }

    .order-item .item-name { flex: 1; }

    .order-item .item-price {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .order-total {
      display: flex;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-weight: 800;
      font-size: 1.1rem;
    }

    .order-total .value { color: var(--accent); }

    .order-discount {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--green);
      padding-top: 6px;
    }

    /* --- Actions --- */
    .order-actions {
      padding: 12px 20px 16px;
      display: flex;
      gap: 10px;
    }

    .order-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-preparo {
      background: rgba(234,179,8,0.15);
      color: var(--yellow);
      border: 1px solid rgba(234,179,8,0.3) !important;
    }

    .btn-preparo:hover { background: rgba(234,179,8,0.3); }

    .btn-pronto {
      background: rgba(34,197,94,0.15);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.3) !important;
    }

    .btn-pronto:hover { background: rgba(34,197,94,0.3); }

    .btn-print {
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      border: 1px solid var(--border) !important;
    }

    .btn-print:hover { background: rgba(255,255,255,0.12); }

    .btn-cancelar {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.25) !important;
    }

    .btn-cancelar:hover { background: rgba(239,68,68,0.25); }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .orders-grid {
        grid-template-columns: 1fr;
      }
      .header-stats {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="kitchen-header">
    <h1>🍞 <span>Panettoneria</span> Julieta — Cozinha</h1>
    <div class="header-status">
      <div class="header-stats">
        <div class="stat-badge"><span class="count" id="count-novo">0</span> Novos</div>
        <div class="stat-badge"><span class="count" id="count-preparo">0</span> Em Preparo</div>
        <div class="stat-badge"><span class="count" id="count-pronto">0</span> Prontos</div>
      </div>
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Conectando...</span>
    </div>
  </header>

  <!-- Main -->
  <main class="kitchen-main">
    <div id="orders-container" class="orders-grid">
      <div class="kitchen-empty">
        <div class="icon">🕐</div>
        <p>Conectando ao sistema de pedidos...</p>
      </div>
    </div>
  </main>

  <!-- Hidden iframe for silent printing -->
  <iframe id="print-frame" style="display:none;"></iframe>

  <script>
    // --- Firebase Init ---
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- State ---
    let orders = [];
    let initialLoad = true;

    // --- Format Currency ---
    const formatCurrency = (val) =>
      val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    // --- Notification Sound ---
    const playSound = () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const playTone = (freq, start, dur) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + dur);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur);
        };
        playTone(880, 0, 0.15);
        playTone(1100, 0.15, 0.15);
        playTone(1320, 0.3, 0.3);
      } catch (_) {}
    };

    // --- Format Timestamp ---
    const formatTime = (ts) => {
      if (!ts) return '--:--';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    };

    const formatDate = (ts) => {
      if (!ts) return '--/--';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('pt-BR');
    };

    // --- Update Counters ---
    const updateCounters = () => {
      document.getElementById('count-novo').textContent =
        orders.filter(o => o.status === 'novo').length;
      document.getElementById('count-preparo').textContent =
        orders.filter(o => o.status === 'preparo').length;
      document.getElementById('count-pronto').textContent =
        orders.filter(o => o.status === 'pronto').length;
    };

    // --- Render Order Card ---
    const renderOrder = (order) => {
      const addr = order.address || {};
      const addrStr = addr.street
        ? `${addr.street}, ${addr.number}${addr.complement ? ' - ' + addr.complement : ''}<br>${addr.neighborhood} - ${addr.city}/${addr.state} | CEP: ${addr.cep}`
        : 'Não informado';

      const itemsHtml = (order.items || []).map(i => `
        <div class="order-item">
          <span class="qty">${i.quantity}x</span>
          <span class="item-name">${i.name} <small style="color:var(--text-muted)">(${i.weight})</small></span>
          <span class="item-price">${formatCurrency(i.itemTotal)}</span>
        </div>
      `).join('');

      let totalsHtml = '';
      if (order.discountAmount > 0) {
        totalsHtml += `
          <div class="order-discount">
            <span>Desconto 20%</span>
            <span>-${formatCurrency(order.discountAmount)}</span>
          </div>`;
      }

      let actionsHtml = '';
      if (order.status === 'novo') {
        actionsHtml = `
          <button class="btn-preparo" onclick="updateStatus('${order.id}', 'preparo')">👨‍🍳 Em Preparo</button>
          <button class="btn-cancelar" onclick="cancelOrder('${order.id}', '${order.orderNum}')">✕</button>
          <button class="btn-print" onclick="printComanda('${order.id}')">🖨️</button>`;
      } else if (order.status === 'preparo') {
        actionsHtml = `
          <button class="btn-pronto" onclick="updateStatus('${order.id}', 'pronto')">✅ Pronto</button>
          <button class="btn-cancelar" onclick="cancelOrder('${order.id}', '${order.orderNum}')">✕</button>
          <button class="btn-print" onclick="printComanda('${order.id}')">🖨️</button>`;
      } else if (order.status === 'cancelado') {
        actionsHtml = `
          <button class="btn-print" onclick="printComanda('${order.id}')" style="flex:1;">🖨️ Reimprimir</button>`;
      } else {
        actionsHtml = `
          <button class="btn-print" onclick="printComanda('${order.id}')" style="flex:1;">🖨️ Reimprimir</button>`;
      }

      const statusLabel = { novo: 'Novo', preparo: 'Em Preparo', pronto: 'Pronto', cancelado: 'Cancelado' };
      const badgeClass = { novo: 'badge-novo', preparo: 'badge-preparo', pronto: 'badge-pronto', cancelado: 'badge-cancelado' };

      return `
        <div class="order-card status-${order.status}" id="order-${order.id}">
          <div class="order-header">
            <div>
              <div class="order-num">#${order.orderNum || '---'}</div>
              <div class="order-time">${formatDate(order.createdAt)} às ${formatTime(order.createdAt)}</div>
            </div>
            <span class="order-status-badge ${badgeClass[order.status] || ''}">${statusLabel[order.status] || order.status}</span>
          </div>
          <div class="order-body">
            <div class="order-client">
              <span class="name">${order.client?.name || 'Sem nome'}</span>
              <span class="detail">📱 ${order.client?.phone || '--'}</span>
              <span class="detail">📄 ${order.client?.doc || '--'}</span>
            </div>
            <div class="order-address">
              <div class="label">📍 Endereço de Entrega</div>
              ${addrStr}
            </div>
            <div class="order-items">${itemsHtml}</div>
            ${totalsHtml}
            <div class="order-total" ${order.status === 'cancelado' ? 'style="text-decoration: line-through; opacity: 0.7;"' : ''}>
              <span>Total</span>
              <span class="value">${formatCurrency(order.finalTotal || 0)}</span>
            </div>
          </div>
          <div class="order-actions">${actionsHtml}</div>
        </div>
      `;
    };

    // --- Render All Orders ---
    const renderOrders = () => {
      const container = document.getElementById('orders-container');

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="kitchen-empty">
            <div class="icon">☕</div>
            <p>Nenhum pedido por enquanto. Aguardando novos pedidos...</p>
          </div>`;
        updateCounters();
        return;
      }

      // Sort: novo first, then preparo, then pronto, then cancelado. Within each, newest first.
      const statusOrder = { novo: 0, preparo: 1, pronto: 2, cancelado: 3 };
      const sorted = [...orders].sort((a, b) => {
        const sa = statusOrder[a.status] ?? 9;
        const sb = statusOrder[b.status] ?? 9;
        if (sa !== sb) return sa - sb;
        const ta = a.createdAt?.toDate?.() || new Date(0);
        const tb = b.createdAt?.toDate?.() || new Date(0);
        return tb - ta;
      });

      container.innerHTML = sorted.map(renderOrder).join('');
      updateCounters();
    };

    // --- Update Status ---
    window.updateStatus = async (id, newStatus) => {
      try {
        await db.collection('pedidos').doc(id).update({ status: newStatus });
      } catch (err) {
        console.error('Erro ao atualizar status:', err);
      }
    };

    // --- Cancel Order ---
    window.cancelOrder = (id, orderNum) => {
      if (confirm(`Tem certeza que deseja CANCELAR o pedido #${orderNum}?`)) {
        updateStatus(id, 'cancelado');
      }
    };

    // --- Print Comanda ---
    window.printComanda = (id) => {
      const order = orders.find(o => o.id === id);
      if (!order) return;

      const now = order.createdAt?.toDate?.() || new Date();
      const dateStr = now.toLocaleDateString('pt-BR');
      const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

      let itemsHtml = '';
      (order.items || []).forEach(item => {
        itemsHtml += `<tr>
          <td style="text-align:left;">${item.quantity}x ${item.name}</td>
          <td style="text-align:right;">${item.weight}</td>
          <td style="text-align:right;">${formatCurrency(item.itemTotal)}</td>
        </tr>`;
      });

      let totalsHtml = '';
      if (order.discountAmount > 0) {
        totalsHtml = `
          <tr><td colspan="2" style="text-align:left;">Subtotal</td><td style="text-align:right;">${formatCurrency(order.subtotal)}</td></tr>
          <tr><td colspan="2" style="text-align:left;">Desc. 20%</td><td style="text-align:right;">-${formatCurrency(order.discountAmount)}</td></tr>
          <tr style="font-weight:bold;font-size:14px;"><td colspan="2" style="text-align:left;">TOTAL</td><td style="text-align:right;">${formatCurrency(order.finalTotal)}</td></tr>`;
      } else {
        totalsHtml = `<tr style="font-weight:bold;font-size:14px;"><td colspan="2" style="text-align:left;">TOTAL</td><td style="text-align:right;">${formatCurrency(order.finalTotal)}</td></tr>`;
      }

      const addr = order.address || {};
      const addrLine = addr.street
        ? `${addr.street}, ${addr.number}${addr.complement ? ' - ' + addr.complement : ''}`
        : '';
      const addrLine2 = addr.neighborhood
        ? `${addr.neighborhood} - ${addr.city}/${addr.state}`
        : '';

      const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Comanda #${order.orderNum}</title>
<style>
  @page { margin: 2mm; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Courier New',monospace; font-size:12px; width:80mm; padding:4mm; color:#000; }
  .center { text-align:center; }
  .divider { border:none; border-top:1px dashed #000; margin:6px 0; }
  table { width:100%; border-collapse:collapse; }
  td { padding:2px 0; font-size:11px; }
  .header-title { font-size:16px; font-weight:bold; }
  .section-title { font-size:11px; font-weight:bold; text-transform:uppercase; margin-bottom:2px; }
</style></head>
<body>
  <div class="center">
    <div class="header-title">PANETTONERIA JULIETA</div>
    <div style="font-size:10px;">Panetones Artesanais</div>
    <div style="font-size:10px;">Tradição, Afeto e Sabor Premium</div>
  </div>
  <hr class="divider">
  <div class="center" style="font-size:10px;">Comanda #${order.orderNum} | ${dateStr} ${timeStr}</div>
  <hr class="divider">

  <div class="section-title">CLIENTE</div>
  <div>${order.client?.name || '--'}</div>
  <div>Tel: ${order.client?.phone || '--'}</div>
  <div>Doc: ${order.client?.doc || '--'}</div>
  <hr class="divider">

  <div class="section-title">ENDEREÇO DE ENTREGA</div>
  <div>${addrLine}</div>
  <div>${addrLine2}</div>
  <div>CEP: ${addr.cep || '--'}</div>
  <hr class="divider">

  <div class="section-title">ITENS</div>
  <table>${itemsHtml}</table>
  <hr class="divider">
  <table>${totalsHtml}</table>
  <hr class="divider">

  <div class="center" style="font-size:10px; margin-top:6px;">
    Obrigado pela preferência!<br>Panettoneria Julieta ♥
  </div>
</body></html>`;

      const printFrame = document.getElementById('print-frame');
      printFrame.srcdoc = html;
      printFrame.onload = () => {
        try { printFrame.contentWindow.print(); } catch(_) {}
      };
    };

    // --- Auto-Print New Orders ---
    const autoPrint = (order) => {
      // Small delay to ensure the card is rendered first
      setTimeout(() => printComanda(order.id), 500);
    };

    // --- Real-time Listener ---
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    db.collection('pedidos')
      .where('createdAt', '>=', today)
      .orderBy('createdAt', 'desc')
      .onSnapshot((snapshot) => {
        // Update connection status
        document.getElementById('status-dot').classList.remove('offline');
        document.getElementById('status-text').textContent = 'Conectado';

        snapshot.docChanges().forEach(change => {
          const data = { id: change.doc.id, ...change.doc.data() };

          if (change.type === 'added') {
            orders.push(data);
            if (!initialLoad) {
              // New order arrived!
              playSound();
              autoPrint(data);
            }
          } else if (change.type === 'modified') {
            const idx = orders.findIndex(o => o.id === data.id);
            if (idx !== -1) orders[idx] = data;
          } else if (change.type === 'removed') {
            orders = orders.filter(o => o.id !== data.id);
          }
        });

        renderOrders();
        initialLoad = false;

        // Flash new orders
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added' && !initialLoad) {
            const el = document.getElementById(`order-${change.doc.id}`);
            if (el) el.classList.add('flash');
          }
        });

      }, (err) => {
        console.error('Erro no listener:', err);
        document.getElementById('status-dot').classList.add('offline');
        document.getElementById('status-text').textContent = 'Desconectado';
      });

  </script>
</body>

</html>
